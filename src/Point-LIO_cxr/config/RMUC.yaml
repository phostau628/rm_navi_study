            # prior_PCD_map_path: "/home/auto/Navi_PCD/test_home_change.pcd" #xinchangdi duimian 
            
            
            
            # prior_PCD_map_path: "/home/auto/github_code/auto_sentry_ws/file/test_rmuc_17.pcd" #RMUC
